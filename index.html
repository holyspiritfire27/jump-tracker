<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>垂直跳高測驗 (自動出圖版)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Microsoft JhengHei', sans-serif; overflow: hidden; background: #000; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas.overlay { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { pointer-events: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #setup-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(5px);
            padding: 25px; border-radius: 15px;
            text-align: center; pointer-events: auto; width: 85%; max-width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        input, select { font-size: 16px; padding: 10px; margin: 8px 0; width: 100%; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; margin-top: 10px; width: 100%; pointer-events: auto; }
        button:active { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #btn-preview { background: #28a745; margin-bottom: 10px; }
        #btn-preview:active { background: #1e7e34; }

        #info-box {
            position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.8); color: white;
            padding: 10px 15px; border-radius: 8px; text-align: right; pointer-events: none; font-size: 14px;
        }
        .big-text { font-size: 22px; font-weight: bold; }
        .green { color: #0f0; } .orange { color: orange; } .cyan { color: cyan;} .yellow { color: #ffeb3b; }
        #guide-text {
            position: absolute; bottom: 120px; width: 100%; text-align: center;
            font-size: 22px; color: yellow; text-shadow: 2px 2px 4px #000; font-weight: bold; pointer-events: none;
        }
        #controls { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: auto; }
        .btn-round { background: rgba(0, 0, 0, 0.6); border: 2px solid white; color: white; width: 65px; height: 65px; border-radius: 50%; margin: 0 5px; font-size: 13px; cursor: pointer; pointer-events: auto; }
        
        #snapshot-panel {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; text-align: center; z-index: 100; pointer-events: auto; width: 80%; max-width: 400px;
        }
        #snapshot-img { width: 100%; border: 2px solid #ffeb3b; border-radius: 8px; margin-bottom: 10px; }
        
        #bound-warning {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.8); color: white; padding: 8px 15px;
            border-radius: 8px; font-weight: bold; font-size: 16px; display: none; z-index: 20;
        }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas" class="overlay"></canvas>
    
    <div id="ui-layer">
        <div id="bound-warning">⚠️ 警告：出框邊緣</div>

        <div id="setup-panel">
            <h2>跳高測驗 V20<br><span style="font-size: 14px; color: #555;">(物理滯空版・自動出圖)</span></h2>
            <div id="loading-status" style="font-size: 14px; color: #666; margin-bottom: 10px;">正在下載 AI 模型...</div>
            
            <input type="text" id="p_name" placeholder="受測者姓名">
            <input type="number" id="p_height" placeholder="身高 (cm)" value="170">
            <select id="p_gender">
                <option value="male">男</option>
                <option value="female">女</option>
            </select>
            
            <button id="btn-preview" onclick="startPreview()">👁️ 允許相機並開啟預覽</button>
            <select id="camera_select" style="display: none;"></select>

            <button id="btn-start" onclick="startApp()" disabled>等待載入與權限...</button>
        </div>

        <div id="info-box" style="display:none;">
            <div id="disp-name" style="font-size:18px; margin-bottom:5px;">--</div>
            <div>物理滯空: <span id="disp-flight-jump" class="yellow big-text">0.0</span> cm</div>
            <hr style="border-color: #555; margin: 5px 0;">
            <div>視覺重心: <span id="disp-com-jump" class="orange">0.0</span></div>
            <div>最高摸高: <span id="disp-max-reach" class="green">0.0</span></div>
            <div id="disp-rating" style="margin-top:5px; font-weight:bold;">評級: --</div>
        </div>
        
        <div id="guide-text" style="display:none;">準備中...</div>

        <div id="controls" style="display:none;">
            <button class="btn-round" onclick="resetTest()">重測<br>(R)</button>
            <button class="btn-round" onclick="showSnapshot()">查看<br>照片</button>
            <button class="btn-round" onclick="location.reload()">換人<br>(N)</button>
        </div>
    </div>

    <div id="snapshot-panel">
        <h3 style="color:white; margin-top:0;">🌟 測驗結果 (已可儲存)</h3>
        <img id="snapshot-img" src="" alt="Snapshot">
        <button onclick="document.getElementById('snapshot-panel').style.display='none'">關閉預覽</button>
        <button onclick="downloadSnapshot()" style="background:#28a745;">💾 下載照片</button>
    </div>
    
    <canvas id="raw_capture_canvas" style="display:none;"></canvas>
    <canvas id="capture_canvas" style="display:none;"></canvas>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('loading-status');
    const btnStart = document.getElementById('btn-start');
    
    let pose = null, currentStream = null;
    let userHeight = 170, userName = "", userGender = "male";
    let isFrontCamera = true; 
    
    let state = 0; 
    let pixelsPerCm = 0;
    
    // 基準線
    let baseHeelY = 0; 
    let baseComY = 0; 
    
    // 最高數據
    let maxComJumpCm = 0; 
    let maxReachCm = 0; 
    let flightHeightCm = 0; // 物理滯空高度
    let finalRatingHeight = 0; // 最終採用高度
    let jumpGradeStr = "--";

    // 狀態機與物理時間變數
    let lastComY = null;
    let lastVelocity = 0;
    let isJumping = false;
    let jumpStartTime = 0;
    let bestImageCaptured = false;

    let stabilityQueue = [];
    let reachQueue = [];
    let heelQueue = [];
    let handQueue = [];
    let comQueue = [];
    const STABILITY_THRES = 0.05;
    let capturedImageURL = null; 

    let isAiLoaded = false;
    let isPreviewReady = false;

    window.onload = function() {
        if (typeof Pose === 'undefined') {
            statusText.innerText = "❌ AI 載入失敗！請檢查網路連線";
            statusText.style.color = "red";
            return;
        }
        statusText.innerText = "✅ AI 模組就緒，請開啟預覽";
        statusText.style.color = "green";
        isAiLoaded = true;
        
        pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);
        
        checkReadyStatus();
    };

    function checkReadyStatus() {
        if (isAiLoaded && isPreviewReady) {
            btnStart.innerText = "開始測驗";
            btnStart.disabled = false;
        }
    }

    async function startPreview() {
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({video: true});
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            const select = document.getElementById('camera_select');
            select.innerHTML = ''; 
            
            videoDevices.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.text = d.label || `未命名鏡頭 ${i + 1}`;
                select.appendChild(opt);
            });
            
            select.onchange = (e) => {
                const selectedText = select.options[select.selectedIndex].text;
                switchCamera(e.target.value, selectedText);
            };
            
            document.getElementById('btn-preview').style.display = 'none';
            select.style.display = 'block';
            
            if(videoDevices.length > 0) {
                switchCamera(videoDevices[0].deviceId, videoDevices[0].label);
            }

            isPreviewReady = true;
            checkReadyStatus();
            
        } catch (err) {
            alert("無法開啟相機，請確認已給予權限！\n" + err.message);
        }
    }

    async function switchCamera(deviceId, label) {
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop()); 
        }
        
        const lowerLabel = label.toLowerCase();
        isFrontCamera = (lowerLabel.includes('front') || lowerLabel.includes('前'));
        
        if (isFrontCamera) {
            videoElement.style.transform = "scaleX(-1)";
            canvasElement.style.transform = "scaleX(-1)";
        } else {
            videoElement.style.transform = "scaleX(1)";
            canvasElement.style.transform = "scaleX(1)";
        }

        try {
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: {
                    deviceId: { exact: deviceId },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            });
            videoElement.srcObject = currentStream;
            videoElement.play();
        } catch (err) {
            console.error("切換鏡頭失敗", err);
        }
    }

    function smooth(value, queue, size = 5){
        queue.push(value);
        if(queue.length > size) queue.shift();
        return queue.reduce((a, b) => a + b, 0) / queue.length;
    }

    async function startApp() {
        userName = document.getElementById('p_name').value || "測試者";
        userHeight = parseFloat(document.getElementById('p_height').value);
        userGender = document.getElementById('p_gender').value;
        
        if(!userHeight || userHeight < 50) { alert("請輸入正確身高"); return; }

        document.getElementById('setup-panel').style.display = 'none';
        document.getElementById('info-box').style.display = 'block';
        document.getElementById('controls').style.display = 'block';
        document.getElementById('guide-text').style.display = 'block';
        document.getElementById('disp-name').innerText = userName;

        state = 1; 
        requestAnimationFrame(processVideoFrame);
    }

    async function processVideoFrame() {
        if (state > 0 && videoElement.readyState >= 2) {
            await pose.send({image: videoElement});
        }
        if (state > 0) {
            requestAnimationFrame(processVideoFrame);
        }
    }

    // 🔥 在最高點時呼叫此函數，無感儲存當前最完美的幀
    function captureRawFrame() {
        const rawCanvas = document.getElementById('raw_capture_canvas');
        const ctx = rawCanvas.getContext('2d');
        rawCanvas.width = videoElement.videoWidth;
        rawCanvas.height = videoElement.videoHeight;
        ctx.save();
        if (isFrontCamera) {
            ctx.translate(rawCanvas.width, 0);
            ctx.scale(-1, 1);
        }
        ctx.drawImage(videoElement, 0, 0, rawCanvas.width, rawCanvas.height);
        ctx.restore();
    }

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        const w = canvasElement.width, h = canvasElement.height;
        
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, w, h);
        
        if (!results.poseLandmarks) {
            document.getElementById('guide-text').innerText = "未偵測到全身...";
            canvasCtx.restore();
            return;
        }

        const lm = results.poseLandmarks;
        if(state === 1 || state === 2) {
            drawConnectors(canvasCtx, lm, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            drawLandmarks(canvasCtx, lm, {color: '#FF0000', lineWidth: 1});
        }
        
        // 腳跟、手部平滑化
        const rawHeelY = Math.max(lm[29].y, lm[30].y);
        const heelY = smooth(rawHeelY, heelQueue, 3);

        const leftIdxY = lm[19].y, rightIdxY = lm[20].y;
        const rawHandTopY = Math.min(leftIdxY, rightIdxY); 
        const handTopY = smooth(rawHandTopY, handQueue, 3);

        // 重心平滑化
        const midHipY = (lm[23].y + lm[24].y) / 2;
        const midShoulderY = (lm[11].y + lm[12].y) / 2;
        const rawComY = midHipY * 0.6 + midShoulderY * 0.4;
        const comY = smooth(rawComY, comQueue, 3); 

        const headY = lm[0].y; 
        const guide = document.getElementById('guide-text');

        if (state === 1) {
            guide.innerText = "步驟1: 請自然站立 (校正身高)"; 
            guide.style.color = "yellow";
            
            if (lm[29].visibility > 0.5 && lm[0].visibility > 0.5) {
                // 修正身高比例，將鼻子到腳底的距離校正為身高 * 0.93，讓像素轉換更精確
                const bodyPx = (heelY - headY) / 0.93; 
                const pxPerCm_est = bodyPx / userHeight; 
                const safeMarginRatio = pxPerCm_est * 125; 

                if (headY < safeMarginRatio) {
                    guide.innerText = "⚠️ 請後退！頭頂需預留 125cm 空間";
                    guide.style.color = "red";
                    stabilityQueue = []; 
                    canvasCtx.restore();
                    return; 
                }

                stabilityQueue.push(heelY);
                canvasCtx.fillStyle = "yellow";
                canvasCtx.fillRect(0, h-20, (stabilityQueue.length/30)*w, 20);
                
                if (stabilityQueue.length > 30) {
                    stabilityQueue.shift();
                    if ((Math.max(...stabilityQueue) - Math.min(...stabilityQueue)) < 0.02) {
                        pixelsPerCm = bodyPx / userHeight;
                        baseHeelY = heelY; 
                        baseComY = comY; 
                        state = 2;
                        stabilityQueue = []; reachQueue = [];
                    }
                }
            } else { guide.innerText = "請後退，確保全身入鏡"; stabilityQueue = []; }
        }
        else if (state === 2) {
            guide.innerText = "步驟2: 單手舉高並靜止"; guide.style.color = "cyan";
            if (handTopY < headY) {
                reachQueue.push(handTopY);
                if(reachQueue.length > 30) reachQueue.shift();
                if (reachQueue.length === 30 && (Math.max(...reachQueue) - Math.min(...reachQueue)) < STABILITY_THRES) {
                    state = 3;
                }
            } else { reachQueue = []; guide.innerText = "手請舉高過頭"; }
        }
        else if (state === 3) {
            guide.innerText = "步驟3: 準備起跳！"; guide.style.color = "#0f0";
            
            let footJumpCm = (baseHeelY - rawHeelY) / pixelsPerCm; 
            let comJumpCm = (baseComY - rawComY) / pixelsPerCm;
            let currentReachCm = (baseHeelY - rawHandTopY) / pixelsPerCm;

            // 1. 偵測起跳 (腳跟離地超過 3cm)
            if (footJumpCm > 3 && !isJumping) {
                isJumping = true;
                jumpStartTime = performance.now();
                bestImageCaptured = false;
                guide.innerText = "空中！";
            }

            if (isJumping) {
                // 更新視覺數據最大值
                if (comJumpCm > maxComJumpCm) maxComJumpCm = comJumpCm;
                if (currentReachCm > maxReachCm) maxReachCm = currentReachCm;

                // 2. 捕捉最高點快門 (透過重心的平滑速度來判斷)
                let velocity = comY - lastComY;
                if (velocity > 0 && lastVelocity <= 0 && comJumpCm > 10 && !bestImageCaptured) {
                    captureRawFrame(); // 背景截圖
                    bestImageCaptured = true;
                }
                lastVelocity = velocity;

                // 3. 偵測落地結算 (腳跟回到地面 3cm 以內，且至少在空中待了 200 毫秒防誤判)
                if (footJumpCm < 3 && (performance.now() - jumpStartTime) > 200) {
                    isJumping = false;
                    let flightTimeSec = (performance.now() - jumpStartTime) / 1000;
                    
                    // 🔥 物理引擎核心： H = 1/8 * g * t^2 (g=980 cm/s^2) -> 122.5 * t^2
                    flightHeightCm = 122.5 * Math.pow(flightTimeSec, 2);

                    // 比較物理高度與視覺高度，由於視角透視壓縮，物理高度通常較為真實
                    finalRatingHeight = Math.max(maxComJumpCm, flightHeightCm);
                    updateRating();

                    // 自動結算與彈出圖片
                    stampAndShowSnapshot();
                }

                // 若受測者離開畫面導致卡在空中，2.5秒後重置
                if ((performance.now() - jumpStartTime) > 2500) {
                    isJumping = false;
                }
            }
            lastComY = comY; 

            // 更新即時數字面板
            document.getElementById('disp-com-jump').innerText = maxComJumpCm.toFixed(1) + " cm";
            document.getElementById('disp-max-reach').innerText = maxReachCm.toFixed(1) + " cm";
            if(flightHeightCm > 0) {
                document.getElementById('disp-flight-jump').innerText = flightHeightCm.toFixed(1);
            }
        }
        canvasCtx.restore();
    }
    
    function updateRating() {
        let r = "D (加油)", color = "gray";
        const h = finalRatingHeight; 
        if (userGender === 'male') {
            if (h >= 70) { r = "S (職業級)"; color = "red"; }
            else if (h >= 60) { r = "A (優秀)"; color = "orange"; }
            else if (h >= 50) { r = "B (良好)"; color = "#0f0"; }
            else if (h >= 40) { r = "C (平均)"; color = "yellow"; }
        } else {
            if (h >= 60) { r = "S (職業級)"; color = "red"; }
            else if (h >= 50) { r = "A (優秀)"; color = "orange"; }
            else if (h >= 40) { r = "B (良好)"; color = "#0f0"; }
            else if (h >= 30) { r = "C (平均)"; color = "yellow"; }
        }
        jumpGradeStr = r;
        const rb = document.getElementById('disp-rating');
        rb.innerText = `評級: ${r}`; rb.style.color = color;
    }

    // 🔥 將數據壓上最高點擷取的照片，並自動彈出
    function stampAndShowSnapshot() {
        if (!bestImageCaptured) captureRawFrame(); // 防呆機制

        const rawCanvas = document.getElementById('raw_capture_canvas');
        const capCanvas = document.getElementById('capture_canvas');
        const ctx = capCanvas.getContext('2d');
        
        capCanvas.width = rawCanvas.width;
        capCanvas.height = rawCanvas.height;
        
        // 畫上原本預存的最高點純淨影像
        ctx.drawImage(rawCanvas, 0, 0);

        // 繪製半透明資訊框
        ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
        ctx.fillRect(20, 20, 420, 250);
        
        ctx.fillStyle = "#00FF00";
        ctx.font = "bold 32px Microsoft JhengHei";
        ctx.fillText(`受測者: ${userName}`, 40, 60);
        
        // 強調物理滯空高度
        ctx.fillStyle = "#ffeb3b"; 
        ctx.fillText(`物理滯空高度: ${flightHeightCm.toFixed(1)} cm`, 40, 110);
        
        ctx.fillStyle = "#FFFFFF";
        ctx.fillText(`視覺重心淨高: ${maxComJumpCm.toFixed(1)} cm`, 40, 150);
        ctx.fillText(`最高摸高: ${maxReachCm.toFixed(1)} cm`, 40, 190);
        
        ctx.fillStyle = "orange";
        ctx.fillText(`綜合評級: ${jumpGradeStr}`, 40, 230);

        // 轉換為影像並自動彈出 UI 面板
        capturedImageURL = capCanvas.toDataURL('image/jpeg', 0.85);
        document.getElementById('snapshot-img').src = capturedImageURL;
        document.getElementById('snapshot-panel').style.display = 'block';
    }

    function showSnapshot() {
        if (!capturedImageURL) { alert("尚未產生跳躍紀錄！請先進行跳躍。"); return; }
        document.getElementById('snapshot-panel').style.display = 'block';
    }

    function downloadSnapshot() {
        if (!capturedImageURL) return;

        fetch(capturedImageURL)
            .then(res => res.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${userName}_垂直跳測驗結果.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            })
            .catch(err => {
                alert("下載失敗，請嘗試用 Chrome 或 Safari 瀏覽器開啟！");
            });
    }

    function resetTest() {
        state = 0; maxReachCm = 0; maxComJumpCm = 0; flightHeightCm = 0; finalRatingHeight = 0;
        stabilityQueue = []; reachQueue = []; 
        heelQueue = []; handQueue = []; comQueue = [];
        lastComY = null; lastVelocity = 0;
        isJumping = false; bestImageCaptured = false;
        capturedImageURL = null;
        
        document.getElementById('bound-warning').style.display = "none";
        document.getElementById('disp-com-jump').innerText = "0.0";
        document.getElementById('disp-flight-jump').innerText = "0.0";
        document.getElementById('disp-max-reach').innerText = "0.0";
        document.getElementById('disp-rating').innerText = "評級: --";
        
        state = 1; 
        requestAnimationFrame(processVideoFrame);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI 垂直跳高測驗 (V18 即時預覽版)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Microsoft JhengHei', sans-serif; overflow: hidden; background: #000; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas.overlay { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { pointer-events: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* 🔥 V18 更新：半透明毛玻璃面板，方便看穿背景預覽 */
        #setup-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(5px);
            padding: 25px; border-radius: 15px;
            text-align: center; pointer-events: auto; width: 85%; max-width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        input, select { font-size: 16px; padding: 10px; margin: 8px 0; width: 100%; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; margin-top: 10px; width: 100%; pointer-events: auto; }
        button:active { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #btn-preview { background: #28a745; margin-bottom: 10px; }
        #btn-preview:active { background: #1e7e34; }

        #info-box {
            position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); color: white;
            padding: 10px 15px; border-radius: 8px; text-align: right; pointer-events: none; font-size: 14px;
        }
        .big-text { font-size: 22px; font-weight: bold; }
        .green { color: #0f0; } .orange { color: orange; } .cyan { color: cyan;}
        #guide-text {
            position: absolute; bottom: 120px; width: 100%; text-align: center;
            font-size: 22px; color: yellow; text-shadow: 2px 2px 4px #000; font-weight: bold; pointer-events: none;
        }
        #controls { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: auto; }
        .btn-round { background: rgba(0, 0, 0, 0.6); border: 2px solid white; color: white; width: 65px; height: 65px; border-radius: 50%; margin: 0 5px; font-size: 13px; cursor: pointer; pointer-events: auto; }
        #snapshot-panel {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; text-align: center; z-index: 100; pointer-events: auto; width: 80%; max-width: 400px;
        }
        #snapshot-img { width: 100%; border: 2px solid #0f0; border-radius: 8px; margin-bottom: 10px; }
        
        #bound-warning {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.8); color: white; padding: 8px 15px;
            border-radius: 8px; font-weight: bold; font-size: 16px; display: none; z-index: 20;
        }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas" class="overlay"></canvas>
    
    <div id="ui-layer">
        <div id="bound-warning">⚠️ 警告：出框邊緣</div>

        <div id="setup-panel">
            <h2>跳高測驗 V18<br><span style="font-size: 14px; color: #555;">(即時預覽鏡頭版)</span></h2>
            <div id="loading-status" style="font-size: 14px; color: #666; margin-bottom: 10px;">正在下載 AI 模型...</div>
            
            <input type="text" id="p_name" placeholder="受測者姓名">
            <input type="number" id="p_height" placeholder="身高 (cm)" value="170">
            <select id="p_gender">
                <option value="male">男</option>
                <option value="female">女</option>
            </select>
            
            <button id="btn-preview" onclick="startPreview()">👁️ 允許相機並開啟預覽</button>
            <select id="camera_select" style="display: none;"></select>

            <button id="btn-start" onclick="startApp()" disabled>等待載入與權限...</button>
        </div>

        <div id="info-box" style="display:none;">
            <div id="disp-name" style="font-size:18px; margin-bottom:5px;">--</div>
            <div>站立摸高: <span id="disp-stand-reach" class="cyan">0.0</span> cm</div>
            <hr style="border-color: #555; margin: 5px 0;">
            <div>腳離地高: <span id="disp-max-foot" class="orange big-text">0.0</span></div>
            <div>最高摸高: <span id="disp-max-reach" class="green big-text">0.0</span></div>
            <div id="disp-rating" style="margin-top:5px;">評級: --</div>
        </div>
        
        <div id="guide-text" style="display:none;">準備中...</div>

        <div id="controls" style="display:none;">
            <button class="btn-round" onclick="resetTest()">重測<br>(R)</button>
            <button class="btn-round" onclick="showSnapshot()">查看<br>照片</button>
            <button class="btn-round" onclick="location.reload()">換人<br>(N)</button>
        </div>
    </div>

    <div id="snapshot-panel">
        <h3 style="color:white; margin-top:0;">最高點紀錄</h3>
        <img id="snapshot-img" src="" alt="Snapshot">
        <button onclick="document.getElementById('snapshot-panel').style.display='none'">關閉</button>
        <button onclick="downloadSnapshot()" style="background:#28a745;">下載儲存</button>
    </div>
    
    <canvas id="capture_canvas" style="display:none;"></canvas>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('loading-status');
    const btnStart = document.getElementById('btn-start');
    
    let pose = null, currentStream = null;
    let userHeight = 170, userName = "", userGender = "male";
    let isFrontCamera = true; 
    
    let state = 0; 
    let pixelsPerCm = 0;
    let baseHeelY = 0; 
    
    let standingReachCm = 0; 
    let maxFootCm = 0;  
    let maxReachCm = 0; 
    let jumpGradeStr = "--";

    let lastHeelY = null;
    let lastVelocity = 0;

    let stabilityQueue = [];
    let reachQueue = [];
    let heelQueue = [];
    let handQueue = [];
    const STABILITY_THRES = 0.05;
    let capturedImageURL = null; 

    let isAiLoaded = false;
    let isPreviewReady = false;

    window.onload = function() {
        if (typeof Pose === 'undefined') {
            statusText.innerText = "❌ AI 載入失敗！請檢查網路連線";
            statusText.style.color = "red";
            return;
        }
        statusText.innerText = "✅ AI 模組就緒，請開啟預覽";
        statusText.style.color = "green";
        isAiLoaded = true;
        
        pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);
        
        checkReadyStatus();
    };

    function checkReadyStatus() {
        if (isAiLoaded && isPreviewReady) {
            btnStart.innerText = "開始測驗";
            btnStart.disabled = false;
        }
    }

    // 🔥 V18 核心：開啟預覽並取得實體鏡頭清單
    async function startPreview() {
        try {
            // 先取得一次基礎鏡頭權限，確保瀏覽器解鎖硬體名稱
            currentStream = await navigator.mediaDevices.getUserMedia({video: true});
            
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            
            const select = document.getElementById('camera_select');
            select.innerHTML = ''; 
            
            videoDevices.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.text = d.label || `未命名鏡頭 ${i + 1}`;
                select.appendChild(opt);
            });
            
            // 當使用者切換選單時，觸發即時切換鏡頭
            select.onchange = (e) => {
                const selectedText = select.options[select.selectedIndex].text;
                switchCamera(e.target.value, selectedText);
            };
            
            // 介面切換
            document.getElementById('btn-preview').style.display = 'none';
            select.style.display = 'block';
            
            // 預設切換到清單中的第一個鏡頭開始預覽
            if(videoDevices.length > 0) {
                switchCamera(videoDevices[0].deviceId, videoDevices[0].label);
            }

            isPreviewReady = true;
            checkReadyStatus();
            
        } catch (err) {
            alert("無法開啟相機，請確認已給予權限！\n" + err.message);
        }
    }

    // 🔥 V18 核心：即時切換鏡頭畫面
    async function switchCamera(deviceId, label) {
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop()); // 關閉上一顆鏡頭
        }
        
        // 依照名稱猜測是否為前置鏡頭來決定翻轉
        const lowerLabel = label.toLowerCase();
        isFrontCamera = (lowerLabel.includes('front') || lowerLabel.includes('前'));
        
        if (isFrontCamera) {
            videoElement.style.transform = "scaleX(-1)";
            canvasElement.style.transform = "scaleX(-1)";
        } else {
            videoElement.style.transform = "scaleX(1)";
            canvasElement.style.transform = "scaleX(1)";
        }

        try {
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: {
                    deviceId: { exact: deviceId },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            });
            videoElement.srcObject = currentStream;
            videoElement.play();
        } catch (err) {
            console.error("切換鏡頭失敗", err);
        }
    }

    function smooth(value, queue, size = 5){
        queue.push(value);
        if(queue.length > size) queue.shift();
        return queue.reduce((a, b) => a + b, 0) / queue.length;
    }

    async function startApp() {
        userName = document.getElementById('p_name').value || "測試者";
        userHeight = parseFloat(document.getElementById('p_height').value);
        userGender = document.getElementById('p_gender').value;
        
        if(!userHeight || userHeight < 50) { alert("請輸入正確身高"); return; }

        document.getElementById('setup-panel').style.display = 'none';
        document.getElementById('info-box').style.display = 'block';
        document.getElementById('controls').style.display = 'block';
        document.getElementById('guide-text').style.display = 'block';
        document.getElementById('disp-name').innerText = userName;

        // 🔥 因為相機已經在預覽階段啟動了，這裡只需直接改變狀態並開始 AI 擷取即可！
        state = 1; 
        requestAnimationFrame(processVideoFrame);
    }

    async function processVideoFrame() {
        if (state > 0 && videoElement.readyState >= 2) {
            await pose.send({image: videoElement});
        }
        if (state > 0) {
            requestAnimationFrame(processVideoFrame);
        }
    }

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        const w = canvasElement.width, h = canvasElement.height;
        
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, w, h);
        
        if (!results.poseLandmarks) {
            document.getElementById('guide-text').innerText = "未偵測到全身...";
            canvasCtx.restore();
            return;
        }

        const lm = results.poseLandmarks;
        if(state === 1 || state === 2) {
            drawConnectors(canvasCtx, lm, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            drawLandmarks(canvasCtx, lm, {color: '#FF0000', lineWidth: 1});
        }
        
        const rawHeelY = Math.max(lm[29].y, lm[30].y);
        const heelY = smooth(rawHeelY, heelQueue, 5);

        const leftIdxY = lm[19].y, rightIdxY = lm[20].y;
        const rawHandTopY = Math.min(leftIdxY, rightIdxY); 
        const handTopY = smooth(rawHandTopY, handQueue, 5);

        const headY = lm[0].y; 
        const guide = document.getElementById('guide-text');
        const boundWarning = document.getElementById('bound-warning');

        if (state === 2 || state === 3) {
            if (handTopY < 0.03) {
                boundWarning.innerText = "⚠️ 手太靠近畫面上緣，測量可能失效！";
                boundWarning.style.display = "block";
            } else if (rawHeelY > 0.97) {
                boundWarning.innerText = "⚠️ 腳太靠近畫面底緣，請退後！";
                boundWarning.style.display = "block";
            } else {
                boundWarning.style.display = "none";
            }
        } else {
            boundWarning.style.display = "none";
        }

        if (state === 1) {
            guide.innerText = "步驟1: 請自然站立 (校正身高)"; 
            guide.style.color = "yellow";
            
            if (lm[29].visibility > 0.5 && lm[0].visibility > 0.5) {
                
                const bodyPx = heelY - headY; 
                const pxPerCm_est = bodyPx / userHeight; 
                const safeMarginRatio = pxPerCm_est * 125; 

                if (headY < safeMarginRatio) {
                    guide.innerText = "⚠️ 請後退！頭頂需預留 125cm 空間（避免跳出畫面）";
                    guide.style.color = "red";
                    stabilityQueue = []; 
                    canvasCtx.restore();
                    return; 
                }

                stabilityQueue.push(heelY);
                canvasCtx.fillStyle = "yellow";
                canvasCtx.fillRect(0, h-20, (stabilityQueue.length/30)*w, 20);
                
                if (stabilityQueue.length > 30) {
                    stabilityQueue.shift();
                    if ((Math.max(...stabilityQueue) - Math.min(...stabilityQueue)) < 0.02) {
                        pixelsPerCm = bodyPx / userHeight;
                        baseHeelY = heelY; 
                        state = 2;
                        stabilityQueue = []; reachQueue = [];
                    }
                }
            } else { guide.innerText = "請後退，確保全身入鏡"; stabilityQueue = []; }
        }
        else if (state === 2) {
            guide.innerText = "步驟2: 單手舉高並靜止"; guide.style.color = "cyan";
            
            let currReachCm = (baseHeelY - handTopY) / pixelsPerCm;
            if(currReachCm > 0) document.getElementById('disp-stand-reach').innerText = currReachCm.toFixed(1);

            if (handTopY < headY) {
                reachQueue.push(handTopY);
                if(reachQueue.length > 30) reachQueue.shift();
                if (reachQueue.length === 30 && (Math.max(...reachQueue) - Math.min(...reachQueue)) < STABILITY_THRES) {
                    standingReachCm = currReachCm;
                    document.getElementById('disp-stand-reach').innerText = standingReachCm.toFixed(1);
                    state = 3;
                }
            } else { reachQueue = []; guide.innerText = "手請舉高過頭"; }
        }
        else if (state === 3) {
            guide.innerText = "步驟3: 跳！"; guide.style.color = "#0f0";
            
            let footJumpCm = 0;
            if (baseHeelY - heelY > 0) footJumpCm = (baseHeelY - heelY) / pixelsPerCm;
            let currentReachCm = (baseHeelY - handTopY) / pixelsPerCm;

            if (footJumpCm > 2) {
                let isNewMax = false;
                if (footJumpCm > maxFootCm) { maxFootCm = footJumpCm; isNewMax = true; }
                if (currentReachCm > maxReachCm) { maxReachCm = currentReachCm; isNewMax = true; }

                if (isNewMax) { updateRating(); }

                let velocity = 0;
                if (lastHeelY !== null) {
                    velocity = heelY - lastHeelY; 
                }

                if (velocity > 0 && lastVelocity <= 0 && footJumpCm >= maxFootCm * 0.9) {
                    captureSnapshotImage();
                }

                lastVelocity = velocity;
            } else {
                lastVelocity = 0; 
            }
            lastHeelY = heelY; 

            document.getElementById('disp-max-foot').innerText = maxFootCm.toFixed(1);
            document.getElementById('disp-max-reach').innerText = maxReachCm.toFixed(1);
        }
        canvasCtx.restore();
    }
    
    function updateRating() {
        let r = "D (加油)", color = "gray";
        const h = maxFootCm; 
        if (userGender === 'male') {
            if (h >= 70) { r = "S (職業級)"; color = "red"; }
            else if (h >= 60) { r = "A (優秀)"; color = "orange"; }
            else if (h >= 50) { r = "B (良好)"; color = "#0f0"; }
            else if (h >= 40) { r = "C (平均)"; color = "yellow"; }
        } else {
            if (h >= 60) { r = "S (職業級)"; color = "red"; }
            else if (h >= 50) { r = "A (優秀)"; color = "orange"; }
            else if (h >= 40) { r = "B (良好)"; color = "#0f0"; }
            else if (h >= 30) { r = "C (平均)"; color = "yellow"; }
        }
        jumpGradeStr = r;
        const rb = document.getElementById('disp-rating');
        rb.innerText = `評級: ${r}`; rb.style.color = color;
    }

    function captureSnapshotImage() {
        const capCanvas = document.getElementById('capture_canvas');
        const ctx = capCanvas.getContext('2d');
        capCanvas.width = videoElement.videoWidth;
        capCanvas.height = videoElement.videoHeight;
        
        ctx.save();
        if (isFrontCamera) {
            ctx.translate(capCanvas.width, 0);
            ctx.scale(-1, 1);
        }
        ctx.drawImage(videoElement, 0, 0, capCanvas.width, capCanvas.height);
        ctx.restore();

        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(20, 20, 360, 180);
        
        ctx.fillStyle = "#00FF00";
        ctx.font = "bold 32px Microsoft JhengHei";
        ctx.fillText(`受測者: ${userName}`, 40, 60);
        ctx.fillStyle = "#FFFFFF";
        ctx.fillText(`腳離地: ${maxFootCm.toFixed(1)} cm`, 40, 110);
        ctx.fillText(`最高摸高: ${maxReachCm.toFixed(1)} cm`, 40, 150);
        ctx.fillStyle = "orange";
        ctx.fillText(`評級: ${jumpGradeStr}`, 40, 190);

        capturedImageURL = capCanvas.toDataURL('image/jpeg', 0.8);
        document.getElementById('snapshot-img').src = capturedImageURL;
    }

    function showSnapshot() {
        if (!capturedImageURL) { alert("尚未產生跳躍紀錄！請先進行跳躍。"); return; }
        document.getElementById('snapshot-panel').style.display = 'block';
    }

    function downloadSnapshot() {
        if (!capturedImageURL) return;

        fetch(capturedImageURL)
            .then(res => res.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${userName}_跳高成績.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            })
            .catch(err => {
                alert("下載失敗，請嘗試用 Chrome 或 Safari 瀏覽器開啟！");
                console.error(err);
            });
    }

    function resetTest() {
        state = 0; maxFootCm = 0; maxReachCm = 0; standingReachCm = 0;
        stabilityQueue = []; reachQueue = []; 
        heelQueue = []; handQueue = []; 
        lastHeelY = null; lastVelocity = 0;
        capturedImageURL = null;
        document.getElementById('bound-warning').style.display = "none";
        document.getElementById('disp-stand-reach').innerText = "0.0";
        document.getElementById('disp-max-foot').innerText = "0.0";
        document.getElementById('disp-max-reach').innerText = "0.0";
        document.getElementById('disp-rating').innerText = "評級: --";
        
        state = 1; 
        requestAnimationFrame(processVideoFrame);
    }
</script>

</body>
</html>
